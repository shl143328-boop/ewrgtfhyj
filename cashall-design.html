<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة السجل الائتماني</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="header-inner">
            <img src="assets/images/cinet-logo.png" class="header-logo" alt="CINET">
        </div>
    </header>

    <!-- Content -->
    <main class="main-content">

        <h1 class="title">مراجعة السجل الائتماني</h1>

        <p class="description">
            نشكركم على تقديم طلب التمويل لدى شركة التسهيلات التجارية.
            لضمان استكمال إجراء الطلب، يرجى سداد رسوم خدمة ساي نت وقدرها 1 دينار كويتي
            لمراجعة السجل الائتماني الخاص بكم.
        </p>

        <!-- Label instead of button -->
        <div class="payment-label">
            اختر طريقة الدفع
        </div>

        <!-- Cards -->
        <div class="cards-wrapper">

            <!-- Card 1 -->
            <a href="https://example.com/knet" class="payment-card">
                <div class="card-content">
                    <img src="assets/images/knet.svg" alt="KNET" class="knet-logo">
                    <!-- <span>تسديد كي نت</span> -->
                    <span>بطاقة سحب الآلي</span>
                </div>
            </a>

            <!-- Card 2 -->
            <a href="https://example.com/card" class="payment-card">
                <div class="card-content">
                    <span>استخدم بطاقة أتمان جديدة</span>

                    <div class="card-logos">
                        <img src="assets/images/visa.png" alt="Visa">
                        <img src="assets/images/amex.png" alt="Amex">
                        <img src="assets/images/mastercard.png" alt="Mastercard">
                    </div>
                </div>
            </a>

        </div>

    </main>

</body>
</html>
